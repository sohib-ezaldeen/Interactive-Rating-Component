<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Overpass:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Interactive Rating Component</title>
  </head>
  <body>
    <main>
      <div class="cover">
        <img src="images/icon-star.svg" alt="Star icon" srcset="" />
      </div>
      <div class="question-box">
        <h1>How did we do?</h1>
        <span class="guidelines">
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering.</span
        >
      </div>

      <div class="box-Evaluation">
        <ul role="listbox">
          <li>
            <button role="option" class="btn-option" data-num="1">1</button>
          </li>
          <li>
            <button role="option" class="btn-option" data-num="2">2</button>
          </li>
          <li>
            <button role="option" class="btn-option" data-num="3">3</button>
          </li>
          <li>
            <button role="option" class="btn-option" data-num="4">4</button>
          </li>
          <li>
            <button role="option" class="btn-option" data-num="5">5</button>
          </li>
        </ul>
        <button class="submit-rating" aria-label="Submit Rating" type="submit">
          Submit Rating
        </button>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
